<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width,initial-scale=1">

    <title>中俣生誕祭2026</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <h1>
        ⚠ 中俣生誕祭2026 ⚠
    </h1>

    <div id="question">
        中俣さんは本日誕生日ですか？
    </div>

    <div id="chargeText">
        ゲージをためろ！！
    </div>

    <button id="yes">はい</button>
    <button id="no">いいえ</button>

    <div id="gaugeBox">
        <div id="gauge"></div>
    </div>

    <div id="modal"></div>
    
    <!-- GAME OVER -->
<div id="gameOver">
    <div id="gameOverText">
        GAME OVER
    </div>

    <div id="gameOverSub">
        誕生日じゃないの、、？
    </div>

    <div id="gameOverMenu">

        <button id="continue1">
            ▶ CONTINUE
        </button>

        <button id="continue2">
            ▶ 続ける
        </button>

    </div>

</div>

    <script src="js/movement.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/gauge.js"></script>
    <script src="js/events.js"></script>
    <script src="js/main.js"></script>

</body>
</html>
